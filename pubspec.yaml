name: emi_calculator
description: "EMI, SIP, FD, RD, PPF & EPF Calculator for India"
publish_to: 'none'
version: 1.0.7+7

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.7.0
  firebase_crashlytics: ^5.2.0
  firebase_remote_config: ^6.4.0
  firebase_analytics: ^12.3.0
  url_launcher: ^6.3.1
  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.2.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  rename: ^3.1.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/appicon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/adi-registration.properties